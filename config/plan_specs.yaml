# Per-plan configuration. `strains` lists the composable strain modules
# (see engine/strains.py) active for that plan — this is the ONLY place
# Plan A and Plan B differ structurally.

plan_a:
  name: "A"
  sum_assured: 6000000
  tpd_benefit_pct_of_sa: 1.00
  initial_commission_rate: 0.15
  renewal_commission_rate: 0.01
  initial_expense_rate: 0.15
  renewal_expense_rate: 0.05
  claim_expense_rate: 0.01           # applied to sum assured -> f
  strains: [death, tpd, surrender, expense, commission, maturity]

plan_b:
  name: "B"
  sum_assured: 6000000
  tpd_benefit_pct_of_sa: 1.00        # unused directly — TPD triggers waiver instead
  initial_commission_rate: 0.15
  renewal_commission_rate: 0.01
  initial_expense_rate: 0.15
  renewal_expense_rate: 0.05
  claim_expense_rate: 0.01
  waived_mortality_loading: 1.50     # applied to base qx_d while in TPD-waived state
  strains: [death, surrender, expense, commission, maturity, waiver]
