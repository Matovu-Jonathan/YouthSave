# Economic / pricing basis -- TERM-INVARIANT assumptions only.
# unit_fund_growth, risk_discount_rate, and non_unit_fund_growth are
# NOT here -- they vary by policy term (Bank of Uganda T-bill derived)
# and live in data/term_rates.csv. See engine/config.py's
# assumptions_for_term() for how they're combined with this file at
# pricing time.

pricing_interest_rate: 0.12        # i  (ARDR, anchored to UG 365-day T-bill)
bid_offer_spread: 0.05             # BO
inflation_rate: 0.05

annual_management_charge: 0.02     # mc
withdrawal_charge: 0.20            # wc

allocation_rate_early: 0.70        # policy years 1-3
allocation_rate_later: 1.00        # policy year 4+
